<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TV Show Project | Seti Mussa (Seti-Jemal)</title>
    <link href="style.css" rel="stylesheet" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
  </head>

  <body>
     <main class="page">
      <header class="page-header">
        <h1>TV Show Episodes</h1>
        <p id="episode-count" class="episode-count"></p>
      </header>
       <section
        id="root"
        class="episode-grid"
        aria-label="List of TV show episodes"
      ></section>
    </main>
    
    <input type="text" id="searchInput" placeholder="Search episodes..." />
    <select id="episodeSelect">
      <option value="all">All episodes</option>
    </select>
    <button id="clearFilters">Clear Filters</button>
    <p id="episode-count"></p>
    <p id="helperMessage"></p>
    <div id="root"></div>

    <p id="activeFilters"></p>



    <!-- Loads a provided function called getAllEpisodes() which returns all episodes -->
